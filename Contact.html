<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Contact</title>
    <meta name="description" content="This Is Our Front_End" />
</head>

<body>
    <section class="hours" id="hours">
        <h1>Contact Us</h1>
        <div>
            <ul>
                <li>
                    <a href="index.html" target="_blank">Home</a><br />
                </li>
                <li>
                    <a href="index.html #about " target="_blank">About LTS</a><br />
                </li>
                <li>
                    <a href="index.html #menu" target="_blank">Our Menu</a><br />
                </li>
                <li>
                    <a href="Hours.html #hours" target="_blank">Store Hours</a>
                </li>
            </ul>
            <figure>
                <img src="tacos.jpg" alt="tacos" width="350" height="300">
                <figcaption>Litle Tacos Shop Tacos</figcaption>
            </figure>
        </div>
        <hr />
        <div>
            <h2>Our Contact Form</h2>
            <form>
                <fieldset style="width: 450px;">
                    <legend>Send Us A Message</legend>
                    <p>
                        <label for="name">name</label>
                        <input type="text" id="name" placeholder="your name" required>
                    </p>
                    <p>
                        <label for="email">email</label>
                        <input type="text" id="email" required placeholder="your email">
                    </p>
                    <p>
                        <label>Phone</label>
                        <input type="tel" id="Phone" name="Phone" required placeholder="your phone">
                    </p>
                    <p>
                        <label>Address</label>
                        <input type="text" name="address" id="address" required placeholder="your address">
                    </p>
                    <p>
                        <label for="message">Your Message</label><br />
                        <textarea id="message" cols="30" rows="10" placeholder="Type your message here"></textarea>
                    </p>

                </fieldset>
                <br />
                <button>send</button>
                <button>reset</button>
            </form>
        </div>
        <div>
            <h2>Our Location <br /></h2>
            <p><i>555 Taco Temptation Lane, Suite T <br />
                    Kansas City, MO 55555-5555 <br /></i></p>
            <p><i>Phone: 555-555-5555</i></p>
        </div>
        <hr />
        <footer>
            <p>Copyright &copy; The Little Taco Shop </p>
        </footer>
    </section>
</body>

</html>
